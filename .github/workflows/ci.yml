name: C CI

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y build-essential meson ninja-build

    - name: Configure build
      run: meson setup build

    - name: Compile
      run: ninja -C build

    - name: Run tests
      run: meson test -C build
